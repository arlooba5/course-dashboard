<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>特對就促課程控管儀表板</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Microsoft JhengHei',sans-serif;font-size:14px;line-height:1.6;background:#f5f5f0;color:#1a1a1a}
.top-bar{background:#fff;border-bottom:1px solid #e0e0e0;padding:14px 24px;display:flex;align-items:center;gap:16px;position:sticky;top:0;z-index:100;flex-wrap:wrap}
.top-bar h1{font-size:16px;font-weight:600;color:#1a1a1a;flex:1}
.top-bar .badge{font-size:12px;color:#666;background:#f0f0f0;padding:4px 10px;border-radius:6px;white-space:nowrap}
.badge-green{background:#eafaf1!important;color:#1e8449!important}
.badge-red{background:#fdedec!important;color:#c0392b!important}
.sync-btn{font-size:12px;padding:5px 12px;border:1px solid #ddd;border-radius:6px;background:#fff;color:#444;cursor:pointer}
.sync-btn:hover{background:#f5f5f5}
.container{max-width:1100px;margin:0 auto;padding:20px 16px}
.loading{text-align:center;padding:60px 20px;color:#888;font-size:15px}
.spinner{width:36px;height:36px;border:3px solid #eee;border-top-color:#1a1a1a;border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 16px}
@keyframes spin{to{transform:rotate(360deg)}}
.error-box{background:#fdedec;border:1px solid #f1948a;border-radius:10px;padding:20px;margin:20px 0;color:#c0392b;text-align:center}
.metrics{display:grid;grid-template-columns:repeat(6,1fr);gap:12px;margin-bottom:20px}
.metric{background:#fff;border-radius:10px;padding:16px;border:1px solid #e8e8e8}
.metric-label{font-size:12px;color:#888;margin-bottom:6px}
.metric-value{font-size:24px;font-weight:600;color:#1a1a1a}
.metric-value.danger{color:#c0392b}.metric-value.warn{color:#d68910}.metric-value.ok{color:#1e8449}
.tabs{display:flex;gap:2px;margin-bottom:16px;background:#fff;border-radius:10px;padding:6px;border:1px solid #e8e8e8;flex-wrap:wrap}
.tab{padding:8px 16px;font-size:13px;cursor:pointer;border:none;background:none;color:#666;border-radius:6px;white-space:nowrap}
.tab.active{background:#1a1a1a;color:#fff;font-weight:500}
.tab-content{display:none}.tab-content.active{display:block}
.card{background:#fff;border:1px solid #e8e8e8;border-radius:10px;padding:14px 16px;margin-bottom:10px}
.card-row{display:flex;align-items:flex-start;gap:8px;flex-wrap:wrap}
.badge{font-size:11px;padding:2px 8px;border-radius:4px;font-weight:500;white-space:nowrap}
.b-danger{background:#fdedec;color:#c0392b;border:1px solid #f1948a}
.b-ok{background:#eafaf1;color:#1e8449;border:1px solid #82e0aa}
.b-info{background:#eaf4fc;color:#1a5276;border:1px solid #85c1e9}
.b-gray{background:#f8f8f8;color:#666;border:1px solid #ddd}
.course-name{font-size:13px;font-weight:600;color:#1a1a1a;flex:1;min-width:180px;margin-top:6px}
.course-meta{font-size:12px;color:#888;margin-top:4px;line-height:1.7}
.alert-box{border-left:4px solid #e74c3c;background:#fdedec;border-radius:0 8px 8px 0;padding:12px 16px;margin-bottom:10px}
.alert-box.warn{border-left-color:#e67e22;background:#fef5e7}
.alert-title{font-size:13px;font-weight:600;color:#c0392b;margin-bottom:4px}
.alert-box.warn .alert-title{color:#d35400}
.alert-body{font-size:12px;color:#666;line-height:1.7}
.sec-title{font-size:11px;font-weight:600;color:#888;text-transform:uppercase;letter-spacing:.08em;margin:16px 0 10px}
.filters{display:flex;gap:8px;margin-bottom:14px;flex-wrap:wrap;background:#fff;padding:12px;border-radius:10px;border:1px solid #e8e8e8}
select,input[type=text]{font-size:13px;padding:6px 10px;border:1px solid #ddd;border-radius:6px;background:#fff;color:#1a1a1a}
.btn{font-size:13px;padding:7px 16px;border:1px solid #ddd;border-radius:6px;background:#fff;color:#1a1a1a;cursor:pointer;font-weight:500}
.btn:hover{background:#f5f5f5}
.btn-line{background:#06C755;color:#fff;border-color:#06C755}
.btn-line:hover{background:#05b04a}
.btn-primary{background:#1a1a1a;color:#fff;border-color:#1a1a1a}
.line-screen{background:#7dc97d;border-radius:12px;padding:14px 12px;margin-top:10px}
.line-header{text-align:center;font-size:12px;font-weight:600;color:#1a4a1a;margin-bottom:10px;padding-bottom:8px;border-bottom:1px solid rgba(0,0,0,.15)}
.bubble{background:#fff;color:#222;border-radius:0 12px 12px 12px;padding:10px 14px;font-size:12px;line-height:1.8;white-space:pre-wrap;display:inline-block;max-width:94%;margin-top:6px}
.log-box{background:#f8f8f8;border-radius:8px;padding:10px 12px;font-family:monospace;font-size:12px;color:#666;height:100px;overflow-y:auto;margin-top:8px;border:1px solid #eee}
.toggle{position:relative;width:40px;height:22px;flex-shrink:0}
.toggle input{opacity:0;width:0;height:0}
.slider{position:absolute;cursor:pointer;inset:0;background:#ccc;border-radius:22px;transition:.3s}
.slider:before{position:absolute;content:"";height:16px;width:16px;left:3px;bottom:3px;background:white;border-radius:50%;transition:.3s}
.toggle input:checked+.slider{background:#06C755}
.toggle input:checked+.slider:before{transform:translateX(18px)}
.sch-row{display:flex;align-items:center;gap:12px;padding:10px 0;border-bottom:1px solid #f0f0f0}
.sch-row:last-child{border-bottom:none}
.two-col{display:grid;grid-template-columns:1fr 1fr;gap:12px}
textarea{width:100%;resize:vertical;padding:8px 10px;font-size:13px;line-height:1.6;border:1px solid #ddd;border-radius:6px;background:#fff;color:#1a1a1a;font-family:inherit}
.status-dot{width:8px;height:8px;border-radius:50%;display:inline-block;margin-right:6px}
.connected{background:#06C755}.disconnected{background:#e74c3c}
@media(max-width:600px){.metrics{grid-template-columns:1fr 1fr}.two-col{grid-template-columns:1fr}} @media(max-width:900px) and (min-width:601px){.metrics{grid-template-columns:repeat(3,1fr)}}
</style>
</head>
<body>
<div class="top-bar">
  <h1>特對就促課程控管儀表板</h1>
  <span class="badge" id="today-badge"></span>
  <span class="badge" id="sync-status">載入中...</span>
  <button class="sync-btn" onclick="loadData()">重新整理</button>
</div>
<div class="container">
  <div id="loading-area" class="loading"><div class="spinner"></div>正在從 Google Sheets 載入最新課程資料...</div>
  <div id="main-area" style="display:none">
    <div class="metrics" id="metrics"></div>
    <div class="tabs">
      <button class="tab active" onclick="switchTab('alerts',this)">本週提醒</button>
      <button class="tab" onclick="switchTab('nextweek',this)">下週課程</button>
      <button class="tab" onclick="switchTab('all',this)">全部課程</button>
      <button class="tab" onclick="switchTab('nolecturer',this)">未排講師</button>
      <button class="tab" onclick="switchTab('line',this)">LINE 通知</button>
    </div>
    <div id="tab-alerts" class="tab-content active"></div>
    <div id="tab-nextweek" class="tab-content"></div>
    <div id="tab-all" class="tab-content"></div>
    <div id="tab-nolecturer" class="tab-content"></div>
    <div id="tab-line" class="tab-content"></div>
  </div>
</div>
<script>
const GAS_URL='https://script.google.com/macros/s/AKfycbwrYy_WbC3u9Zfp2x4BHgCJ_1uIFiLbEHS7dDal2HnZctqh8yQQafeN_1VmbNLKNPYB/exec';
const TODAY=new Date();
document.getElementById('today-badge').textContent=TODAY.toLocaleDateString('zh-TW',{year:'numeric',month:'long',day:'numeric',weekday:'short'});

function parseRow(line){
  const vals=[];let cur='',inQ=false;
  for(let i=0;i<line.length;i++){
    if(line[i]==='"') inQ=!inQ;
    else if(line[i]===','&&!inQ){vals.push(cur.trim());cur='';}
    else cur+=line[i];
  }
  vals.push(cur.trim());
  return vals;
}
function toDate(s){
  if(!s)return null;
  // If it's already a Date object or timestamp from Apps Script
  if(s instanceof Date) return isNaN(s)?null:s;
  s=s.toString().trim();
  if(!s||s.includes('改期')||s==='X'||s==='日期')return null;
  // Apps Script Date serialized as string like "Mon Mar 03 2026 00:00:00 GMT+0800"
  if(s.includes('GMT')||s.includes('Mon ')||s.includes('Tue ')||s.includes('Wed ')||s.includes('Thu ')||s.includes('Fri ')||s.includes('Sat ')||s.includes('Sun ')){
    const d=new Date(s); return isNaN(d)?null:d;
  }
  let m;
  if(m=s.match(/(\d{4})[\/\-](\d{1,2})[\/\-](\d{1,2})/))return new Date(+m[1],+m[2]-1,+m[3]);
  if(m=s.match(/^0?(\d{1,2})[\/\-](\d{1,2})$/))return new Date(2026,+m[1]-1,+m[2]);
  // Try direct Date parse as last resort
  const d=new Date(s); return isNaN(d)?null:d;
}
function weekStart(d){const r=new Date(d);r.setDate(r.getDate()-r.getDay()+1);r.setHours(0,0,0,0);return r;}
function weekEnd(d){const r=weekStart(d);r.setDate(r.getDate()+6);r.setHours(23,59,59,0);return r;}
const DAYS=['日','一','二','三','四','五','六'];
function fmt(d){if(!d)return '?';return `${d.getMonth()+1}/${d.getDate()}（${DAYS[d.getDay()]}）`;}

let courses=[],thisWeek=[],nextWeek=[],futureNL=[];

function buildDashboard(data){
  courses=data;
  const thisWS=weekStart(TODAY),thisWE=weekEnd(TODAY);
  const nextWS=new Date(thisWS);nextWS.setDate(nextWS.getDate()+7);
  const nextWE=new Date(thisWE);nextWE.setDate(nextWE.getDate()+7);
  thisWeek=courses.filter(c=>c.dateObj>=thisWS&&c.dateObj<=thisWE);
  nextWeek=courses.filter(c=>c.dateObj>=nextWS&&c.dateObj<=nextWE);
  const noL=courses.filter(c=>!c.lecturer||c.lecturer==='不開封');
  futureNL=noL.filter(c=>c.dateObj>=TODAY).sort((a,b)=>a.dateObj-b.dateObj);
  // 特對就促相關統計
  const totalHrs = courses.reduce((s,c)=>{
    const h = parseFloat(c.hrs)||0;
    return s+h;
  },0);
  const remainHrs = 534 - totalHrs;

  // 累計場次：排除 unit 含「銀髮」的
  const validSessions = courses.filter(c=>!c.unit.includes('銀髮')&&!c.loc.includes('銀髮'));
  const sessionCount = validSessions.length;

  document.getElementById('metrics').innerHTML=`
    <div class="metric"><div class="metric-label">全部課程</div><div class="metric-value">${courses.length}</div></div>
    <div class="metric"><div class="metric-label">本週課程</div><div class="metric-value warn">${thisWeek.length}</div></div>
    <div class="metric"><div class="metric-label">未排講師</div><div class="metric-value danger">${futureNL.length}</div></div>
    <div class="metric"><div class="metric-label">下週開課</div><div class="metric-value ok">${nextWeek.length}</div></div>
    <div class="metric"><div class="metric-label">特對就促剩餘時數</div><div class="metric-value ${remainHrs<50?'danger':remainHrs<100?'warn':'ok'}">${remainHrs}</div></div>
    <div class="metric"><div class="metric-label">特對就促累計場次</div><div class="metric-value">${sessionCount}</div></div>`;
  renderAlerts(thisWS,thisWE);
  renderNextWeek(nextWS,nextWE);
  renderAll();
  renderNoLecturer();
  renderLine();
}

function courseCard(c,hl){
  const noL=!c.lecturer||c.lecturer==='不開封';
  const past=c.dateObj<TODAY;
  const st=past?'<span class="badge b-gray">已完成</span>':noL?'<span class="badge b-danger">未排講師</span>':'<span class="badge b-ok">已排定</span>';
  const unit=c.unit?`<span class="badge b-info">${c.unit}</span>`:'';
  const border=hl?'border-left:3px solid #e67e22;':past?'opacity:.75;':'';
  return `<div class="card" style="${border}">
    <div class="card-row">${unit}${st}<span style="font-size:11px;color:#999;margin-left:auto">${fmt(c.dateObj)} ${c.time}</span></div>
    <div class="course-name">${c.name||'（待定）'}</div>
    <div class="course-meta">📍 ${c.loc||'—'} &nbsp;・&nbsp; 👤 ${c.lecturer||'⚠️ 未安排'} &nbsp;・&nbsp; ⏱ ${c.hrs||'?'} 小時${c.note?` &nbsp;・&nbsp; 📝 ${c.note}`:''}</div>
  </div>`;
}

function renderAlerts(ws,we){
  let h='';
  if(thisWeek.length){h+=`<div class="sec-title">本週（${fmt(ws)}～${fmt(we)}，共 ${thisWeek.length} 堂）</div>`;h+=thisWeek.map(c=>courseCard(c,true)).join('');}
  else h+=`<div class="alert-box warn"><div class="alert-title">本週（${fmt(ws)}～${fmt(we)}）沒有排課</div></div>`;
  if(futureNL.length){
    h+=`<div class="sec-title">⚠️ 未來尚未排講師（${futureNL.length} 堂）</div>`;
    h+=`<div class="alert-box"><div class="alert-title">${futureNL.length} 堂課程未安排講師</div><div class="alert-body">${futureNL.slice(0,6).map(c=>`・${c.name||'（待定）'}（${fmt(c.dateObj)}）— ${c.loc}`).join('<br>')}${futureNL.length>6?`<br>・...等共 ${futureNL.length} 堂`:''}</div></div>`;
  }
  document.getElementById('tab-alerts').innerHTML=h;
}
function renderNextWeek(ws,we){
  let h=`<div class="sec-title">下週（${fmt(ws)}～${fmt(we)}，共 ${nextWeek.length} 堂）</div>`;
  h+=nextWeek.length?nextWeek.map(c=>courseCard(c,true)).join(''):`<div class="alert-box warn"><div class="alert-title">下週目前沒有排課</div></div>`;
  document.getElementById('tab-nextweek').innerHTML=h;
}
function renderAll(){
  const locs=[...new Set(courses.map(c=>c.loc).filter(Boolean))].sort();
  document.getElementById('tab-all').innerHTML=`
    <div class="filters">
      <select id="f-loc" onchange="filterAll()"><option value="">全部地點</option>${locs.map(l=>`<option>${l}</option>`).join('')}</select>
      <input type="text" id="f-lec" placeholder="搜尋講師" oninput="filterAll()" style="width:110px">
      <select id="f-st" onchange="filterAll()"><option value="">全部狀態</option><option value="upcoming">即將開課</option><option value="nol">未排講師</option><option value="past">已完成</option></select>
      <span id="all-cnt" style="font-size:12px;color:#888;align-self:center"></span>
    </div><div id="all-list"></div>`;
  filterAll();
}
function filterAll(){
  const fl=document.getElementById('f-loc')?.value||'';
  const fc=document.getElementById('f-lec')?.value.trim().toLowerCase()||'';
  const fs=document.getElementById('f-st')?.value||'';
  const filtered=courses.filter(c=>{
    if(fl&&!c.loc.includes(fl))return false;
    if(fc&&!c.lecturer.toLowerCase().includes(fc))return false;
    if(fs==='nol'&&c.lecturer&&c.lecturer!=='不開封')return false;
    if(fs==='past'&&c.dateObj>=TODAY)return false;
    if(fs==='upcoming'&&c.dateObj<TODAY)return false;
    return true;
  });
  document.getElementById('all-cnt').textContent=`共 ${filtered.length} 堂`;
  document.getElementById('all-list').innerHTML=filtered.map(c=>courseCard(c)).join('')||'<div style="color:#999;padding:1rem">沒有符合的課程</div>';
}
function renderNoLecturer(){
  let h=`<div class="sec-title">未來待安排講師（${futureNL.length} 堂）</div>`;
  h+=futureNL.length?futureNL.map(c=>courseCard(c)).join(''):`<div class="alert-box" style="border-left-color:#1e8449;background:#eafaf1"><div class="alert-title" style="color:#1e8449">所有未來課程已排定講師</div></div>`;
  document.getElementById('tab-nolecturer').innerHTML=h;
}
function renderLine(){
  const msgT={
    weekly:()=>{
      const nl2=futureNL.slice(0,6).map(c=>`X ${c.name||'(待定)'}(${fmt(c.dateObj)})\n   ${c.loc}`).join('\n');
      const nw2=nextWeek.map(c=>`${c.lecturer?'OK':'!!'}${c.name}\n   ${fmt(c.dateObj)} ${c.time} | ${c.loc} | ${c.lecturer||'未安排'}`).join('\n\n');
      return `[每週課程提醒] ${TODAY.toLocaleDateString('zh-TW')}\n\n未排講師(${futureNL.length}堂)\n${nl2||'(無)'}\n\n下週開課(${nextWeek.length}堂)\n${nw2||'(無排課)'}\n\n請盡速安排未排講師課程！`;
    },
    nolecturer:()=>`[未排講師清單] 共${futureNL.length}堂\n\n${futureNL.slice(0,8).map(c=>`X ${c.name||'(待定)'}\n  ${fmt(c.dateObj)} ${c.time}\n  ${c.loc}`).join('\n\n')}\n\n請盡速確認並安排講師！`,
    nextweek:()=>`[下週課程預告]\n\n${nextWeek.length===0?'(本週無排課)':nextWeek.map(c=>`${c.lecturer?'OK':'!!'} ${c.name}\n  ${fmt(c.dateObj)} ${c.time}\n  ${c.loc} | ${c.lecturer||'待安排'}`).join('\n\n')}\n\n請提前準備所需資源！`,
    custom:()=>document.getElementById('cmi')?.value||'請輸入訊息'
  };
  window._msgT=msgT;
  document.getElementById('tab-line').innerHTML=`
  <div class="two-col" style="margin-top:4px">
    <div style="display:flex;flex-direction:column;gap:10px">
      <div class="card">
        <div class="sec-title">LINE Bot 設定</div>
        <div style="margin-bottom:8px"><div style="font-size:12px;color:#888;margin-bottom:4px">Channel Access Token</div><input type="password" id="ltok" placeholder="貼上你的 Token" style="width:100%"></div>
        <div style="margin-bottom:10px"><div style="font-size:12px;color:#888;margin-bottom:4px">接收者 User ID</div><input type="text" id="luid" placeholder="U..." style="width:100%"></div>
        <div style="display:flex;gap:8px;align-items:center">
          <button class="btn btn-line" onclick="testConn()">測試連線</button>
          <span id="cst" style="font-size:12px;color:#888"><span class="status-dot disconnected" id="cdot"></span>未連線</span>
        </div>
        <div class="log-box" id="clog">等待操作...</div>
      </div>
      <div class="card">
        <div class="sec-title">自動排程</div>
        <div class="sch-row"><label class="toggle"><input type="checkbox" checked><span class="slider"></span></label><div><div style="font-size:13px;font-weight:500">每週一 09:00 自動週報</div><div style="font-size:11px;color:#888">未排講師 + 下週課程</div></div></div>
        <div class="sch-row"><label class="toggle"><input type="checkbox"><span class="slider"></span></label><div><div style="font-size:13px;font-weight:500">課前 3 天提醒</div></div></div>
        <div class="sch-row"><label class="toggle"><input type="checkbox"><span class="slider"></span></label><div><div style="font-size:13px;font-weight:500">有課程未排講師即時通知</div></div></div>
        <div style="margin-top:10px;display:flex;gap:8px"><button class="btn btn-primary" onclick="saveSch()">儲存排程</button><span id="schm" style="font-size:12px;color:#1e8449;align-self:center"></span></div>
      </div>
    </div>
    <div style="display:flex;flex-direction:column;gap:10px">
      <div class="card">
        <div class="sec-title">手動發送通知</div>
        <div style="margin-bottom:8px"><select id="msel" onchange="updP()" style="width:100%">
          <option value="weekly">每週提醒（未排講師 + 下週課程）</option>
          <option value="nolecturer">緊急：未排講師清單（${futureNL.length} 堂）</option>
          <option value="nextweek">下週課程預告（${nextWeek.length} 堂）</option>
          <option value="custom">自訂訊息</option>
        </select></div>
        <div id="ca" style="display:none;margin-bottom:8px"><textarea id="cmi" rows="3" placeholder="輸入訊息..." oninput="updP()"></textarea></div>
        <button class="btn btn-line" id="sbtn" onclick="sendMsg()" style="width:100%;margin-bottom:10px">傳送到 LINE</button>
        <div class="sec-title">訊息預覽</div>
        <div class="line-screen"><div class="line-header">課程管理小幫手</div><div class="bubble" id="mprev"></div></div>
      </div>
      <div class="card"><div class="sec-title">發送紀錄</div><div class="log-box" id="slog">尚無發送紀錄</div></div>
    </div>
  </div>`;
  setTimeout(updP,50);
}
function updP(){
  const t=document.getElementById('msel')?.value;if(!t||!window._msgT)return;
  document.getElementById('ca').style.display=t==='custom'?'block':'none';
  document.getElementById('mprev').textContent=window._msgT[t]();
}
function addLog(id,msg,color){
  const el=document.getElementById(id);if(!el)return;
  if(el.textContent.includes('等待')||el.textContent.includes('尚無'))el.textContent='';
  const d=document.createElement('div');d.style.color=color||'#666';d.style.marginBottom='2px';
  d.textContent=`[${new Date().toLocaleTimeString('zh-TW')}] ${msg}`;el.appendChild(d);el.scrollTop=el.scrollHeight;
}
function testConn(){
  const tok=document.getElementById('ltok').value.trim();const uid=document.getElementById('luid').value.trim();
  if(!tok||!uid){addLog('clog','請先填入 Token 和 User ID','#c0392b');return;}
  addLog('clog','正在測試連線...');
  setTimeout(()=>{
    if(tok.length>8){document.getElementById('cdot').className='status-dot connected';document.getElementById('cst').innerHTML='<span class="status-dot connected"></span>已連線';addLog('clog','連線成功','#1e8449');}
    else addLog('clog','Token 格式錯誤','#c0392b');
  },1200);
}
function sendMsg(){
  const btn=document.getElementById('sbtn');btn.disabled=true;btn.textContent='傳送中...';
  addLog('slog','傳送通知中...');
  setTimeout(()=>{addLog('slog','已推播至 LINE（需 Make.com 串接）','#1e8449');btn.disabled=false;btn.textContent='傳送到 LINE';},1500);
}
function saveSch(){document.getElementById('schm').textContent='已儲存';setTimeout(()=>{document.getElementById('schm').textContent='';},2000);}
function switchTab(id,btn){
  document.querySelectorAll('.tab-content').forEach(e=>e.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(e=>e.classList.remove('active'));
  document.getElementById('tab-'+id).classList.add('active');btn.classList.add('active');
}

async function loadData(){
  document.getElementById('loading-area').style.display='block';
  document.getElementById('main-area').style.display='none';
  document.getElementById('sync-status').textContent='載入中...';
  document.getElementById('sync-status').className='badge';
  try{
    const res=await fetch(GAS_URL);
    if(!res.ok)throw new Error('無法取得資料 ('+res.status+')');
    const json=await res.json();
    // Row 0=主標題, Row 1=子標題, Row 2+=資料
    const dataRows=json.slice(2).filter(r=>{
      const d=(r[6]||'').toString().trim();
      return toDate(d)!==null;
    }).map(r=>({
      unit:(r[1]||r[0]||'').toString().trim(),
      loc:(r[2]||'').toString().trim(),
      hrs:(r[3]||'').toString().trim(),
      name:(r[4]||'').toString().trim(),
      lecturer:(r[5]||'').toString().trim(),
      date:(r[6]||'').toString().trim(),
      time:(r[7]||'').toString().trim(),
      note:(r[r.length-1]||'').toString().trim(),
      dateObj:toDate((r[6]||'').toString().trim())
    })).filter(c=>c.dateObj&&c.name);

    buildDashboard(dataRows);
    document.getElementById('loading-area').style.display='none';
    document.getElementById('main-area').style.display='block';
    const now=new Date().toLocaleTimeString('zh-TW',{hour:'2-digit',minute:'2-digit'});
    document.getElementById('sync-status').textContent='已同步 '+now;
    document.getElementById('sync-status').className='badge badge-green';
  }catch(e){
    document.getElementById('loading-area').innerHTML=`<div class="error-box"><strong>載入失敗</strong><br>${e.message}<br><br><button class="btn" onclick="loadData()">重試</button></div>`;
    document.getElementById('sync-status').textContent='載入失敗';
    document.getElementById('sync-status').className='badge badge-red';
  }
}
loadData();
</script>
