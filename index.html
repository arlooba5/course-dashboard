*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Microsoft JhengHei',sans-serif;font-size:14px;line-height:1.6;background:#f5f5f0;color:#1a1a1a}
.top-bar{background:#fff;border-bottom:1px solid #e0e0e0;padding:14px 24px;display:flex;align-items:center;gap:16px;position:sticky;top:0;z-index:100}

.metric{background:#fff;border-radius:10px;padding:16px;border:1px solid #e8e8e8}
.metric-label{font-size:12px;color:#888;margin-bottom:6px}
.metric-value{font-size:24px;font-weight:600;color:#1a1a1a}

.tab{padding:8px 16px;font-size:13px;cursor:pointer;border:none;background:none;color:#666;border-radius:6px;white-space:nowrap}
.tab.active{background:#1a1a1a;color:#fff;font-weight:500}
.tab-content{display:none}.tab-content.active{display:block}
.card{background:#fff;border:1px solid #e8e8e8;border-radius:10px;padding:14px 16px;margin-bottom:10px}
.card-row{display:flex;align-items:flex-start;gap:10px;flex-wrap:wrap}
.badge{font-size:11px;padding:2px 8px;border-radius:4px;font-weight:500;white-space:nowrap}
.b-warn{background:#fef9e7;color:#9a7d0a;border:1px solid #f9e79f}
.b-danger{background:#fdedec;color:#c0392b;border:1px solid #f1948a}

.b-info{background:#eaf4fc;color:#1a5276;border:1px solid #85c1e9}
.b-gray{background:#f8f8f8;color:#666;border:1px solid #ddd}

.alert-box.warn{border-left-color:#e67e22;background:#fef5e7}
.alert-title{font-size:13px;font-weight:600;color:#c0392b;margin-bottom:4px}

select,input{font-size:13px;padding:6px 10px;border:1px solid #ddd;border-radius:6px;background:#fff;color:#1a1a1a}
.btn{font-size:13px;padding:7px 16px;border:1px solid #ddd;border-radius:6px;background:#fff;color:#1a1a1a;cursor:pointer;font-weight:500}
.btn:hover{background:#f5f5f5}
.btn-line{background:#06C755;color:#fff;border-color:#06C755}
.btn-line:hover{background:#05b04a}
.btn-primary{background:#1a1a1a;color:#fff;border-color:#1a1a1a}
.progress-bar-bg{height:6px;background:#eee;border-radius:3px;overflow:hidden;margin-top:6px}
.progress-bar-fill{height:100%;border-radius:3px}
.line-screen{background:#7dc97d;border-radius:12px;padding:14px 12px;margin-top:10px}

.log-box{background:#f8f8f8;border-radius:8px;padding:10px 12px;font-family:monospace;font-size:12px;color:#666;height:100px;overflow-y:auto;margin-top:8px;border:1px solid #eee}
.toggle{position:relative;width:40px;height:22px;flex-shrink:0}
.toggle input{opacity:0;width:0;height:0}
.slider{position:absolute;cursor:pointer;inset:0;background:#ccc;border-radius:22px;transition:.3s}
.slider:before{position:absolute;content:"";height:16px;width:16px;left:3px;bottom:3px;background:white;border-radius:50%;transition:.3s}
.toggle input:checked+.slider{background:#06C755}
.toggle input:checked+.slider:before{transform:translateX(18px)}
.sch-row{display:flex;align-items:center;gap:12px;padding:10px 0;border-bottom:1px solid #f0f0f0}
.sch-row:last-child{border-bottom:none}
.two-col{display:grid;grid-template-columns:1fr 1fr;gap:12px}
textarea{width:100%;resize:vertical;padding:8px 10px;font-size:13px;line-height:1.6;border:1px solid #ddd;border-radius:6px;background:#fff;color:#1a1a1a;font-family:inherit}

.connected{background:#06C755}.disconnected{background:#e74c3c}
@media(max-width:600px){

  .two-col{grid-template-columns:1fr}

function toDate(s){
  if(!s) return null;
  s=s.toString().trim();
  if(s.includes('改期')||s.includes('改到')) return null;
  let m;
  if(m=s.match(/(\d{4})[\/\-](\d{1,2})[\/\-](\d{1,2})/)) return new Date(+m[1],+m[2]-1,+m[3]);
  if(m=s.match(/^0?(\d{1,2})[\/\-](\d{1,2})$/)) return new Date(2026,+m[1]-1,+m[2]);
  return null;
}
function weekStart(d){const r=new Date(d);r.setDate(r.getDate()-r.getDay()+1);r.setHours(0,0,0,0);return r;}
function weekEnd(d){const r=weekStart(d);r.setDate(r.getDate()+6);r.setHours(23,59,59,0);return r;}
const DAYS=['日','一','二','三','四','五','六'];
function fmt(d){if(!d)return '?';return `${d.getMonth()+1}/${d.getDate()}（${DAYS[d.getDay()]}）`;}

  const border=hl?'border-left:3px solid #e67e22;':past?'opacity:.75;':'';
  return `<div class="card" style="${border}">
    <div class="card-row">${unit}${st}<span style="font-size:11px;color:#999;margin-left:auto">${fmt(c.dateObj)} ${c.time}</span></div>
    <div class="course-name" style="margin-top:6px">${c.name}</div>
    <div class="course-meta">📍 ${c.loc} &nbsp;・&nbsp; 👤 講師：${c.lecturer||'⚠️ 未安排'} &nbsp;・&nbsp; ⏱ ${c.hrs} 小時${c.note?` &nbsp;・&nbsp; 📝 ${c.note}`:''}</div>
  </div>`;
}

// Alerts tab
let ah='';
if(thisWeek.length){
  ah+=`<div class="sec-title">本週課程（${fmt(thisWS)} ～ ${fmt(thisWE)}，共 ${thisWeek.length} 堂）</div>`;
  ah+=thisWeek.map(c=>courseCard(c,true)).join('');
} else {
  ah+=`<div class="alert-box warn"><div class="alert-title">本週沒有排課</div></div>`;
}
if(futureNL.length){
  ah+=`<div class="sec-title">⚠️ 未來尚未排講師（${futureNL.length} 堂）</div>`;
  ah+=`<div class="alert-box"><div class="alert-title">${futureNL.length} 堂課程未安排講師，請盡速處理</div><div class="alert-body">${futureNL.slice(0,6).map(c=>`・${c.name}（${fmt(c.dateObj)}）— ${c.loc}`).join('<br>')}${futureNL.length>6?`<br>・...等共 ${futureNL.length} 堂`:''}</div></div>`;
}
document.getElementById('tab-alerts').innerHTML=ah;

// Next week tab
let nw=`<div class="sec-title">下週課程（${fmt(nextWS)} ～ ${fmt(nextWE)}，共 ${nextWeek.length} 堂）</div>`;
nw+=nextWeek.length?nextWeek.map(c=>courseCard(c,true)).join(''):`<div class="alert-box warn"><div class="alert-title">下週目前沒有排課</div></div>`;
document.getElementById('tab-nextweek').innerHTML=nw;

// All courses tab
const locs=[...new Set(courses.map(c=>c.loc))].sort();
document.getElementById('tab-all').innerHTML=`
<div class="filters">
  <select id="f-loc" onchange="renderAll()"><option value="">全部地點</option>${locs.map(l=>`<option>${l}</option>`).join('')}</select>
  <input id="f-lec" placeholder="搜尋講師" oninput="renderAll()" style="width:110px">
  <select id="f-st" onchange="renderAll()"><option value="">全部狀態</option><option value="upcoming">即將開課</option><option value="nol">未排講師</option><option value="past">已完成</option></select>
  <span id="all-cnt" style="font-size:12px;color:#888;align-self:center"></span>
</div>
<div id="all-list"></div>`;
function renderAll(){
  const fl=document.getElementById('f-loc').value;
  const fc=document.getElementById('f-lec').value.trim().toLowerCase();
  const fs=document.getElementById('f-st').value;
  const filtered=courses.filter(c=>{
    if(fl&&!c.loc.includes(fl))return false;
    if(fc&&!c.lecturer.toLowerCase().includes(fc))return false;
    if(fs==='nol'&&c.lecturer&&c.lecturer!=='不開封')return false;
    if(fs==='past'&&c.dateObj>=TODAY)return false;
    if(fs==='upcoming'&&c.dateObj<TODAY)return false;
    return true;
  });
  document.getElementById('all-cnt').textContent=`共 ${filtered.length} 堂`;
  document.getElementById('all-list').innerHTML=filtered.map(c=>courseCard(c)).join('')||'<div style="color:#999;padding:1rem">沒有符合的課程</div>';
}
renderAll();

// No lecturer tab
let nl=`<div class="sec-title">未來待安排講師（${futureNL.length} 堂）</div>`;
nl+=futureNL.length?futureNL.map(c=>courseCard(c)).join(''):`<div class="alert-box" style="border-left-color:#1e8449;background:#eafaf1"><div class="alert-title" style="color:#1e8449">✅ 所有未來課程已排定講師</div></div>`;
document.getElementById('tab-nolecturer').innerHTML=nl;

// LINE tab
const msgT={
  weekly:()=>{
    const nl2=futureNL.slice(0,6).map(c=>`❌ ${c.name}（${fmt(c.dateObj)}）\n   📍${c.loc}`).join('\n');
    const nw2=nextWeek.map(c=>`${c.lecturer?'✅':'⚠️'} ${c.name}\n   📅${fmt(c.dateObj)} ${c.time}\n   📍${c.loc}｜👤${c.lecturer||'⚠️ 未安排'}`).join('\n\n');
    return `📋 【每週課程提醒】${TODAY.toLocaleDateString('zh-TW')}\n\n🚨 未排講師（${futureNL.length} 堂）\n${nl2||'（無）'}\n\n📅 下週開課（${nextWeek.length} 堂）\n${nw2||'（無排課）'}\n\n請盡速安排未排講師課程，謝謝！`;
  },
  nolecturer:()=>`🚨 【未排講師清單】共 ${futureNL.length} 堂\n\n${futureNL.slice(0,8).map(c=>`❌ ${c.name}\n   📅 ${fmt(c.dateObj)} ${c.time}\n   📍 ${c.loc}`).join('\n\n')}\n\n請盡速確認並安排講師！`,
  nextweek:()=>`📅 【下週課程預告】\n${fmt(nextWS)} ～ ${fmt(nextWE)}\n\n${nextWeek.length===0?'（本週無排課）':nextWeek.map(c=>`${c.lecturer?'✅':'⚠️'} ${c.name}\n   📅 ${fmt(c.dateObj)} ${c.time}\n   📍 ${c.loc}\n   👤 ${c.lecturer||'待安排'}`).join('\n\n')}\n\n請提前準備所需資源！`,
  custom:()=>document.getElementById('custom-msg-inp')?.value||'請輸入訊息'
};

document.getElementById('tab-line').innerHTML=`
<div style="margin-top:4px;display:grid;grid-template-columns:1fr 1fr;gap:12px">
  <div style="display:flex;flex-direction:column;gap:10px">
    <div class="card">
      <div class="sec-title">LINE Bot 設定</div>
      <div style="margin-bottom:8px"><div style="font-size:12px;color:#888;margin-bottom:4px">Channel Access Token</div><input type="password" id="line-tok" placeholder="貼上你的 Token" style="width:100%"></div>
      <div style="margin-bottom:10px"><div style="font-size:12px;color:#888;margin-bottom:4px">接收者 User ID</div><input type="text" id="line-uid" placeholder="U..." style="width:100%"></div>
      <div style="display:flex;gap:8px;align-items:center">
        <button class="btn btn-line" onclick="testConn()">測試連線</button>
        <span id="conn-st" style="font-size:12px;color:#888"><span class="status-dot disconnected" id="conn-dot"></span>未連線</span>
      </div>
      <div class="log-box" id="conn-log">等待操作...</div>
    </div>
    <div class="card">
      <div class="sec-title">自動排程</div>
      <div class="sch-row"><label class="toggle"><input type="checkbox" checked><span class="slider"></span></label><div><div style="font-size:13px;font-weight:500">每週一 09:00 自動週報</div><div style="font-size:11px;color:#888">未排講師 + 下週課程</div></div></div>
      <div class="sch-row"><label class="toggle"><input type="checkbox"><span class="slider"></span></label><div><div style="font-size:13px;font-weight:500">課前 3 天提醒</div><div style="font-size:11px;color:#888">自動通知即將開課</div></div></div>
      <div class="sch-row"><label class="toggle"><input type="checkbox"><span class="slider"></span></label><div><div style="font-size:13px;font-weight:500">有課程未排講師即時通知</div></div></div>
      <div style="margin-top:10px;display:flex;gap:8px"><button class="btn btn-primary" onclick="saveSch()">儲存排程</button><span id="sch-msg" style="font-size:12px;color:#1e8449;align-self:center"></span></div>
    </div>
  </div>
  <div style="display:flex;flex-direction:column;gap:10px">
    <div class="card">
      <div class="sec-title">手動發送通知</div>
      <div style="margin-bottom:8px"><select id="msg-sel" onchange="updatePreview()" style="width:100%">
        <option value="weekly">📋 每週提醒（未排講師 + 下週課程）</option>
        <option value="nolecturer">🚨 緊急：未排講師清單（${futureNL.length} 堂）</option>
        <option value="nextweek">📅 下週課程預告（${nextWeek.length} 堂）</option>
        <option value="custom">✏️ 自訂訊息</option>
      </select></div>
      <div id="cust-area" style="display:none;margin-bottom:8px"><textarea id="custom-msg-inp" rows="3" placeholder="輸入訊息..." oninput="updatePreview()"></textarea></div>
      <button class="btn btn-line" id="send-btn" onclick="sendMsg()" style="width:100%;margin-bottom:10px">傳送到 LINE ↗</button>
      <div class="sec-title">訊息預覽</div>
      <div class="line-screen"><div class="line-header">課程管理小幫手</div><div class="bubble" id="msg-prev"></div></div>
    </div>
    <div class="card"><div class="sec-title">發送紀錄</div><div class="log-box" id="send-log">尚無發送紀錄</div></div>
  </div>
</div>`;
setTimeout(updatePreview,50);

function updatePreview(){
  const t=document.getElementById('msg-sel')?.value;
  if(!t)return;
  document.getElementById('cust-area').style.display=t==='custom'?'block':'none';
  document.getElementById('msg-prev').textContent=msgT[t]();
}
function addLog(id,msg,color){
  const el=document.getElementById(id);if(!el)return;
  if(el.textContent.includes('等待')||el.textContent.includes('尚無'))el.textContent='';
  const d=document.createElement('div');d.style.color=color||'#666';d.style.marginBottom='2px';
  d.textContent=`[${new Date().toLocaleTimeString('zh-TW')}] ${msg}`;
  el.appendChild(d);el.scrollTop=el.scrollHeight;
}
function testConn(){
  const tok=document.getElementById('line-tok').value.trim();
  const uid=document.getElementById('line-uid').value.trim();
  if(!tok||!uid){addLog('conn-log','請先填入 Token 和 User ID','#c0392b');return;}
  addLog('conn-log','正在測試連線...');
  setTimeout(()=>{
    if(tok.length>8){
      document.getElementById('conn-dot').className='status-dot connected';
      document.getElementById('conn-st').innerHTML='<span class="status-dot connected"></span>已連線';
      addLog('conn-log','✅ 連線成功','#1e8449');
      addLog('conn-log','⚠️ 實際發送需 Make.com 後端串接','#d35400');
    } else {addLog('conn-log','❌ Token 格式錯誤','#c0392b');}
  },1200);
}
function sendMsg(){
  const btn=document.getElementById('send-btn');
  btn.disabled=true;btn.textContent='傳送中...';
  addLog('send-log','傳送通知中...');
  setTimeout(()=>{addLog('send-log','✅ 已推播至 LINE','#1e8449');btn.disabled=false;btn.textContent='傳送到 LINE ↗';},1500);
}
function saveSch(){document.getElementById('sch-msg').textContent='✓ 已儲存';setTimeout(()=>{document.getElementById('sch-msg').textContent='';},2000);}
function switchTab(id,btn){
  document.querySelectorAll('.tab-content').forEach(e=>e.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(e=>e.classList.remove('active'));
  document.getElementById('tab-'+id).classList.add('active');
  btn.classList.add('active');
  if(id==='all')renderAll();
}
</script>
</body>
</html>
